  /api/v2/infra_monitoring/hosts:
    post:
      deprecated: false
      description: "Returns a paginated list of hosts with key infrastructure metrics:\
        \ CPU usage (%), memory usage (%), I/O wait (%), disk usage (%), and 15-minute\
        \ load average. Each host includes its current status (active/inactive based\
        \ on metrics reported in the last 10 minutes) and metadata attributes (e.g.,\
        \ os.type). Supports filtering via a filter expression, filtering by host\
        \ status, custom groupBy to aggregate hosts by any attribute, ordering by\
        \ any of the five metrics, and pagination via offset/limit. The response type\
        \ is 'list' for the default host.name grouping or 'grouped_list' for custom\
        \ groupBy keys. Also reports missing required metrics and whether the requested\
        \ time range falls before the data retention boundary. Numeric metric fields\
        \ (cpu, memory, wait, load15, diskUsage) return -1 as a sentinel when no data\
        \ is available for that field."
      operationId: ListHosts
      requestBody:
        content:
          application/json:
