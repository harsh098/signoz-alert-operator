          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenderErrorResponse"
          description: Internal Server Error
      security:
      - api_key:
        - EDITOR
      - tokenizer:
        - EDITOR
      summary: Test alert rule
      tags:
      - rules
