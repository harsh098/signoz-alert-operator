      - tokenizer:
        - VIEWER
      summary: List Hosts for Infra Monitoring
      tags:
      - inframonitoring
  /api/v2/infra_monitoring/pods:
    post:
      deprecated: false
      description: "Returns a paginated list of Kubernetes pods with key metrics:\
        \ CPU usage, CPU request/limit utilization, memory working set, memory request/limit\
        \ utilization, current pod phase (pending/running/succeeded/failed/unknown),\
        \ and pod age (ms since start time). Each pod includes metadata attributes\
        \ (namespace, node, workload owner such as deployment/statefulset/daemonset/job/cronjob,\
        \ cluster). Supports filtering via a filter expression, custom groupBy to\
        \ aggregate pods by any attribute, ordering by any of the six metrics (cpu,\
        \ cpu_request, cpu_limit, memory, memory_request, memory_limit), and pagination\
        \ via offset/limit. The response type is 'list' for the default k8s.pod.uid\
        \ grouping (each row is one pod with its current phase) or 'grouped_list'\
        \ for custom groupBy keys (each row aggregates pods in the group with per-phase\
        \ counts: pendingPodCount, runningPodCount, succeededPodCount, failedPodCount,\
        \ unknownPodCount derived from each pod's latest phase in the window). Also\
        \ reports missing required metrics and whether the requested time range falls\
        \ before the data retention boundary. Numeric metric fields (podCPU, podCPURequest,\
        \ podCPULimit, podMemory, podMemoryRequest, podMemoryLimit, podAge) return\
        \ -1 as a sentinel when no data is available for that field."
      operationId: ListPods
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InframonitoringtypesPostablePods"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPods_200_response"
          description: OK
