name: Release

# Tag-based release. Push a tag matching `v*.*.*` (e.g. `git tag v0.1.0 && git push --tags`)
# to build a multi-arch operator image, push it to GHCR as both `:vX.Y.Z` and
# `:latest`, generate a self-contained install manifest, and create a GitHub
# Release with the manifest attached.

on:
  push:
    tags:
      - 'v*.*.*'
  # Manual dispatch helps test the workflow without cutting a tag.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Must already exist as a git tag.'
        required: true

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub Release + upload assets
      packages: write   # push to ghcr.io
      id-token: write   # for future cosign / SLSA provenance (no-op today)

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.tag.outputs.tag }}
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Set up QEMU (cross-arch emulation for buildx)
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Login to GHCR
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch operator image
        env:
          IMG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          # Cut down from the Makefile default to the two architectures that
          # matter for k8s clusters in practice — speeds CI by ~3x.
          PLATFORMS: linux/amd64,linux/arm64
        run: make docker-buildx IMG="$IMG" PLATFORMS="$PLATFORMS"

      - name: Tag image as :latest
        env:
          SRC: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          DST: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        run: docker buildx imagetools create --tag "$DST" "$SRC"

      - name: Generate install manifest
        env:
          IMG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
        run: make build-installer IMG="$IMG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/install.yaml
          body: |
            ## Container image

            ```
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ```

            Multi-arch: `linux/amd64`, `linux/arm64`.

            ## Install

            ```
            kubectl apply -f https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/install.yaml
            ```
