# This rule is not used by the project signoz-alert-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over monitoring.ops.signoz.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: signoz-alert-operator
    app.kubernetes.io/managed-by: kustomize
  name: alert-admin-role
rules:
- apiGroups:
  - monitoring.ops.signoz.io
  resources:
  - alerts
  verbs:
  - '*'
- apiGroups:
  - monitoring.ops.signoz.io
  resources:
  - alerts/status
  verbs:
  - get
