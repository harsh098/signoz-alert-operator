# This rule is not used by the project signoz-alert-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to monitoring.hmx86.cloud resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: signoz-alert-operator
    app.kubernetes.io/managed-by: kustomize
  name: endpoint-viewer-role
rules:
- apiGroups:
  - monitoring.hmx86.cloud
  resources:
  - endpoints
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - monitoring.hmx86.cloud
  resources:
  - endpoints/status
  verbs:
  - get
