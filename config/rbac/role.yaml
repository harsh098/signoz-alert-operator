---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - monitoring.hmx86.cloud
  resources:
  - alerts
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - monitoring.hmx86.cloud
  resources:
  - alerts/finalizers
  verbs:
  - update
- apiGroups:
  - monitoring.hmx86.cloud
  resources:
  - alerts/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - monitoring.hmx86.cloud
  resources:
  - endpoints
  verbs:
  - get
  - list
  - watch
