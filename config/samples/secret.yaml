# Reference only — NOT included in config/samples/kustomization.yaml (and therefore
# not in the OLM bundle), so no placeholder credential ships to OperatorHub.
# Create your own Secret before applying the Endpoint sample:
#   kubectl apply -f config/samples/secret.yaml   (after editing api-key)
apiVersion: v1
kind: Secret
metadata:
  name: signoz-prod-credentials
  labels:
    app.kubernetes.io/name: signoz-alert-operator
    app.kubernetes.io/managed-by: kustomize
type: Opaque
stringData:
  # Replace with your real SigNoz API key. Token must have at least EDITOR scope
  # for the rules API (POST/PUT/DELETE /api/v2/rules).
  api-key: REPLACE_ME
