apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "monitoring.hmx86.cloud/v1alpha1",
          "kind": "Alert",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "signoz-alert-operator"
            },
            "name": "payments-api-error-rate"
          },
          "spec": {
            "endpointRef": {
              "name": "signoz-prod"
            },
            "rule": {
              "alert": "Payments-api error log rate above 1%",
              "alertType": "LOGS_BASED_ALERT",
              "annotations": {
                "description": "Error log rate in {{$deployment.environment}} is {{$value}}%",
                "summary": "Payments-api error rate above {{$threshold}}%"
              },
              "condition": {
                "compositeQuery": {
                  "panelType": "graph",
                  "queries": [
                    {
                      "spec": {
                        "aggregations": [
                          {
                            "expression": "count()"
                          }
                        ],
                        "filter": {
                          "expression": "service.name = 'payments-api' AND severity_text IN ['ERROR','FATAL']"
                        },
                        "name": "A",
                        "signal": "logs",
                        "stepInterval": 60
                      },
                      "type": "builder_query"
                    }
                  ]
                },
                "matchType": "at_least_once",
                "op": "above",
                "target": 1
              },
              "description": "Error log rate above 1% for payments-api",
              "evalWindow": "5m",
              "frequency": "1m",
              "labels": {
                "severity": "warning",
                "team": "payments"
              },
              "ruleType": "threshold_rule"
            }
          }
        },
        {
          "apiVersion": "monitoring.hmx86.cloud/v1alpha1",
          "kind": "Endpoint",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "signoz-alert-operator"
            },
            "name": "signoz-prod"
          },
          "spec": {
            "instanceURL": "https://example.signoz.cloud",
            "secretKeyRef": {
              "key": "api-key",
              "name": "signoz-prod-credentials"
            }
          }
        }
      ]
    capabilities: Basic Install
    categories: Monitoring
    containerImage: ghcr.io/harsh098/signoz-alert-operator:v1.131.0
    createdAt: "2026-07-04T16:39:56Z"
    description: Declaratively manage SigNoz alert rules and instance endpoints as
      Kubernetes custom resources.
    operators.operatorframework.io/builder: operator-sdk-v1.42.3
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
    repository: https://github.com/harsh098/signoz-alert-operator
    support: Harsh Mishra
  name: signoz-alert-operator.v1.131.0
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: Alert is the Schema for the alerts API.
      displayName: Alert
      kind: Alert
      name: alerts.monitoring.hmx86.cloud
      specDescriptors:
      - description: |-
          EndpointRef holds reference to the kind Endpoint
          the points at the target Signoz Instance
        displayName: Endpoint Reference
        path: endpointRef
      - description: |-
          Rule is the SigNoz alert rule body (matches RuletypesPostableRule from
          the SigNoz API). Schema-validated server-side only at the top level —
          contents are forwarded verbatim to SigNoz.
          The current controller is wire compatible with
          https://signoz.io/api-reference/v0.131.1#/operations/CreateRule
        displayName: SigNoz Rule Body
        path: rule
      statusDescriptors:
      - description: Errors is the response body from the most recent non-2xx SigNoz
          API call. Empty on success.
        displayName: Errors
        path: errors
        x-descriptors:
        - urn:alm:descriptor:text
      - description: HTTPStatus is the HTTP status code from the most recent SigNoz
          API call.
        displayName: Last HTTP Status
        path: httpStatus
      - description: RuleID is the SigNoz-assigned rule ID. Empty until first successful
          create.
        displayName: SigNoz Rule ID
        path: ruleID
      version: v1alpha1
    - description: Endpoint is the Schema for the endpoints API.
      displayName: Endpoint
      kind: Endpoint
      name: endpoints.monitoring.hmx86.cloud
      specDescriptors:
      - description: |-
          InstanceURL is the URL Endpoint starting with http:// or https:// for
          the self-hosted or Signoz Cloud Instance.
        displayName: SigNoz Instance URL
        path: instanceURL
        x-descriptors:
        - urn:alm:descriptor:org.w3:link
      - description: |-
          SecretRef is the reference to the secret containing the API Key for Signoz.
          Required if using Signoz Cloud.
        displayName: API Key Secret Reference
        path: secretKeyRef
      - description: |-
          Key within the Secret's data storing the required
          API Key
        displayName: API Key Secret Key
        path: secretKeyRef.key
      - description: Name of Secret containing the API Key
        displayName: API Key Secret Name
        path: secretKeyRef.name
        x-descriptors:
        - urn:alm:descriptor:io.kubernetes:Secret
      version: v1alpha1
  description: |
    ## SigNoz Alert Operator

    The SigNoz Alert Operator lets you manage [SigNoz](https://signoz.io) alert
    rules declaratively as Kubernetes custom resources. Alert rule bodies live in
    Git alongside the rest of your manifests and are reconciled into SigNoz through
    its `/api/v2/rules` API — no clicking through the UI, no drift.

    ### Custom Resources

    * **Endpoint** — points at a SigNoz instance (Cloud or self-hosted) and
      references a Secret containing an API key with rule write access.
    * **Alert** — references an Endpoint and carries a SigNoz rule body in
      `spec.rule`. The rule is a schemaless field forwarded verbatim, so the full
      SigNoz rule schema is available without the operator needing to model it.

    ### How it works

    The controller reconciles each Alert against its Endpoint: it creates the rule
    on first apply, updates it on change, and deletes it on removal. Idempotency
    across clusters is handled with a `k8s_id` label stamped onto every managed
    rule, so an Alert adopts a pre-existing SigNoz rule rather than duplicating it.

    ### Getting started

    1. Create a Secret with your SigNoz API key.
    2. Create an `Endpoint` referencing that Secret and your instance URL.
    3. Create `Alert` resources whose `spec.rule` holds your SigNoz rule bodies.

    See the [usage guide](https://github.com/harsh098/signoz-alert-operator/blob/main/Usage.md)
    for a full walkthrough, rule-body examples, and troubleshooting.
  displayName: SigNoz Alert Operator
  icon:
  - base64data: 
    mediatype: image/svg+xml
  install:
    spec:
      clusterPermissions:
      - rules:
        - apiGroups:
          - ""
          resources:
          - secrets
          verbs:
          - get
          - list
          - watch
        - apiGroups:
          - monitoring.hmx86.cloud
          resources:
          - alerts
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - monitoring.hmx86.cloud
          resources:
          - alerts/finalizers
          verbs:
          - update
        - apiGroups:
          - monitoring.hmx86.cloud
          resources:
          - alerts/status
          verbs:
          - get
          - patch
          - update
        - apiGroups:
          - monitoring.hmx86.cloud
          resources:
          - endpoints
          verbs:
          - get
          - list
          - watch
        - apiGroups:
          - authentication.k8s.io
          resources:
          - tokenreviews
          verbs:
          - create
        - apiGroups:
          - authorization.k8s.io
          resources:
          - subjectaccessreviews
          verbs:
          - create
        serviceAccountName: signoz-alert-operator-controller-manager
      deployments:
      - label:
          app.kubernetes.io/managed-by: kustomize
          app.kubernetes.io/name: signoz-alert-operator
          control-plane: controller-manager
        name: signoz-alert-operator-controller-manager
        spec:
          replicas: 1
          selector:
            matchLabels:
              app.kubernetes.io/name: signoz-alert-operator
              control-plane: controller-manager
          strategy: {}
          template:
            metadata:
              annotations:
                kubectl.kubernetes.io/default-container: manager
              labels:
                app.kubernetes.io/name: signoz-alert-operator
                control-plane: controller-manager
            spec:
              containers:
              - args:
                - --metrics-bind-address=:8443
                - --leader-elect
                - --health-probe-bind-address=:8081
                command:
                - /manager
                image: controller:latest
                livenessProbe:
                  httpGet:
                    path: /healthz
                    port: 8081
                  initialDelaySeconds: 15
                  periodSeconds: 20
                name: manager
                readinessProbe:
                  httpGet:
                    path: /readyz
                    port: 8081
                  initialDelaySeconds: 5
                  periodSeconds: 10
                resources:
                  limits:
                    cpu: 500m
                    memory: 128Mi
                  requests:
                    cpu: 10m
                    memory: 64Mi
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                    - ALL
              securityContext:
                runAsNonRoot: true
                seccompProfile:
                  type: RuntimeDefault
              serviceAccountName: signoz-alert-operator-controller-manager
              terminationGracePeriodSeconds: 10
      permissions:
      - rules:
        - apiGroups:
          - ""
          resources:
          - configmaps
          verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - coordination.k8s.io
          resources:
          - leases
          verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - ""
          resources:
          - events
          verbs:
          - create
          - patch
        serviceAccountName: signoz-alert-operator-controller-manager
    strategy: deployment
  installModes:
  - supported: false
    type: OwnNamespace
  - supported: false
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - signoz
  - alerting
  - alerts
  - observability
  - monitoring
  - gitops
  links:
